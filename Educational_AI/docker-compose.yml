  #     - "9099:9099"   # Auth
  #     - "8080:8080"   # Firestore
  #     - "9199:9199"   # Storage
  #     - "4000:4000"   # Emulator UI
  #   volumes:
  #     - ./firebase.json:/home/node/firebase.json
  #     - ./firestore.rules:/home/node/firestore.rules
  #   command: firebase emulators:start --project synthesis-studio-dev
