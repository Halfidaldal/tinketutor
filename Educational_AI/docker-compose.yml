version: "3.8"

services:
  api:
    build: ./apps/api
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=local
      - FIREBASE_PROJECT_ID=synthesis-studio-dev
      - CORS_ORIGINS=["http://localhost:3000"]
    volumes:
      - ./apps/api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Firebase Emulator Suite (optional — can also run directly)
  # firebase-emulators:
