name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  FIREBASE_PROJECT_ID: demo-synthesis-studio
  NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
  NEXT_PUBLIC_FIREBASE_API_KEY: test
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: test
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: test
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: test
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: test
  NEXT_PUBLIC_FIREBASE_APP_ID: test

jobs:
  backend-tests:
    name: Backend Tests (Firebase Emulators)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@15.6.0

      - name: Create backend virtualenv
        working-directory: apps/api
        run: |
          python -m venv .venv
          ./.venv/bin/pip install --upgrade pip
          ./.venv/bin/pip install -r requirements.txt

      - name: Run backend tests against Firebase emulators
        run: |
          firebase emulators:exec --only auth,firestore,storage --project "${FIREBASE_PROJECT_ID}" "cd apps/api && env PYTHONPATH=. ./.venv/bin/pytest -q"

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Run frontend lint
        working-directory: apps/web
        run: npm run lint

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Run frontend build
        working-directory: apps/web
        run: npm run build
