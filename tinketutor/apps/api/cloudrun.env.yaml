ENVIRONMENT: prod
FIREBASE_PROJECT_ID: tinktetutor
GOOGLE_CLOUD_PROJECT: tinktetutor
# Generative region — Gemini 3.x preview is served on the `global` endpoint only
GOOGLE_CLOUD_LOCATION: global
# Embedding region — embedding models are regional-only and NOT on `global`
GOOGLE_CLOUD_EMBEDDING_LOCATION: us-central1
FIREBASE_STORAGE_BUCKET: run-sources-tinktetutor-europe-west1
LLM_PROVIDER: google_vertex
GEMINI_MODEL: gemini-3.1-pro-preview
VERTEX_EMBEDDING: text-multilingual-embedding-002
RETRIEVAL_ENABLE_VECTOR: "true"
CORS_ORIGINS: '["https://tinketutor-web.vercel.app"]'
